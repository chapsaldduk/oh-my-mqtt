name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & Package
        run: pnpm run package --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip
            dist-electron/*.exe
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/*.yml
            dist-electron/*.yaml
            dist-electron/*.blockmap
          if-no-files-found: ignore

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download macOS DMGs and calculate sha256
        id: sha
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          curl -sL "https://github.com/chapsaldduk/oh-my-mqtt/releases/download/v${VERSION}/Oh.My.MQTT-${VERSION}-arm64.dmg" -o arm64.dmg
          curl -sL "https://github.com/chapsaldduk/oh-my-mqtt/releases/download/v${VERSION}/Oh.My.MQTT-${VERSION}.dmg" -o x64.dmg
          echo "arm64=$(shasum -a 256 arm64.dmg | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "x64=$(shasum -a 256 x64.dmg | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: chapsaldduk/homebrew-oh-my-mqtt
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update Cask formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_ARM64="${{ steps.sha.outputs.arm64 }}"
          SHA_X64="${{ steps.sha.outputs.x64 }}"

          cat > Casks/oh-my-mqtt.rb << 'CASK'
          cask "oh-my-mqtt" do
            version "VERSION_PLACEHOLDER"

            on_arm do
              sha256 "SHA_ARM64_PLACEHOLDER"
              url "https://github.com/chapsaldduk/oh-my-mqtt/releases/download/v#{version}/Oh.My.MQTT-#{version}-arm64.dmg"
            end

            on_intel do
              sha256 "SHA_X64_PLACEHOLDER"
              url "https://github.com/chapsaldduk/oh-my-mqtt/releases/download/v#{version}/Oh.My.MQTT-#{version}.dmg"
            end

            name "Oh My MQTT"
            desc "Modern desktop MQTT client for macOS, Windows, and Linux"
            homepage "https://github.com/chapsaldduk/oh-my-mqtt"

            app "Oh My MQTT.app"
          end
          CASK

          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/" Casks/oh-my-mqtt.rb
          sed -i "s/SHA_ARM64_PLACEHOLDER/${SHA_ARM64}/" Casks/oh-my-mqtt.rb
          sed -i "s/SHA_X64_PLACEHOLDER/${SHA_X64}/" Casks/oh-my-mqtt.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/oh-my-mqtt.rb
          git commit -m "Update oh-my-mqtt to v${{ steps.version.outputs.version }}"
          git push

  notify:
    needs: [build, publish]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Set result status
        id: status
        run: |
          if [ "${{ needs.build.result }}" = "success" ] && [ "${{ needs.publish.result }}" = "success" ]; then
            echo "result=success" >> $GITHUB_OUTPUT
            echo "color=3066993" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
          else
            echo "result=failure" >> $GITHUB_OUTPUT
            echo "color=15158332" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
          fi

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        if: env.DISCORD_WEBHOOK_URL != ''
        run: |
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"
          RUN_URL="${GITHUB_SERVER_URL}/${REPO}/actions/runs/${GITHUB_RUN_ID}"
          RELEASE_URL="${GITHUB_SERVER_URL}/${REPO}/releases/tag/${TAG}"

          curl -s -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"${{ steps.status.outputs.emoji }} Oh My MQTT ${TAG} Deploy ${{ steps.status.outputs.result }}\",
                \"url\": \"${RUN_URL}\",
                \"color\": ${{ steps.status.outputs.color }},
                \"fields\": [
                  { \"name\": \"Tag\", \"value\": \"\`${TAG}\`\", \"inline\": true },
                  { \"name\": \"Build\", \"value\": \"\`${{ needs.build.result }}\`\", \"inline\": true },
                  { \"name\": \"Publish\", \"value\": \"\`${{ needs.publish.result }}\`\", \"inline\": true },
                  { \"name\": \"Release\", \"value\": \"[Download](${RELEASE_URL})\", \"inline\": true }
                ],
                \"footer\": { \"text\": \"GitHub Actions\" },
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }" \
            "$DISCORD_WEBHOOK_URL"
